name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Sync package version with tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+].+)?$ ]]; then
            echo "Tag $GITHUB_REF_NAME is not a full semver (vMAJOR.MINOR.PATCH). Aborting."
            exit 1
          fi
          npm version --no-git-tag-version --allow-same-version "$TAG"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build distributions
        run: npm run build:distributions

      - name: Archive Codex bundle
        run: tar -C .build/distributions/codex -czf .build/distributions/beatly-codex-${GITHUB_REF_NAME}.tar.gz beatly

      - name: Archive Claude Code bundle
        run: tar -C .build/distributions/claude-code -czf .build/distributions/beatly-claude-code-${GITHUB_REF_NAME}.tar.gz beatly

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: beatly-release-distributions-${{ github.ref_name }}
          path: |
            .build/distributions/codex
            .build/distributions/claude-code
            .build/distributions/pi
            .build/distributions/*.tar.gz
          if-no-files-found: error

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attach release bundles
        uses: softprops/action-gh-release@v3
        with:
          files: |
            .build/distributions/beatly-codex-${{ github.ref_name }}.tar.gz
            .build/distributions/beatly-claude-code-${{ github.ref_name }}.tar.gz

      - name: Checkout Codex marketplace
        uses: actions/checkout@v5
        with:
          repository: getbeatly/codex
          path: codex-marketplace
          token: ${{ secrets.CODEX_MARKETPLACE_TOKEN }}

      - name: Publish plugin to Codex marketplace
        working-directory: codex-marketplace
        run: |
          set -euo pipefail
          rm -rf beatly
          mkdir -p beatly
          cp -R ../.build/distributions/codex/beatly/. beatly/
          git config user.name "beatly-bot"
          git config user.email "bot@beatly.dev"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Update Beatly plugin to ${GITHUB_REF_NAME}"
          git tag "${GITHUB_REF_NAME}"
          git push origin main
          git push origin "${GITHUB_REF_NAME}"
