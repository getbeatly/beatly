name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build distributions
        run: npm run build:distributions

      - name: Pack (dry run)
        run: npm pack --dry-run

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beatly-distributions
          path: .build/distributions
          if-no-files-found: error
